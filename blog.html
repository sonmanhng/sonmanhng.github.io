<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyen Son | Blog</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        .post-tags {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .tag {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border-color);
            color: var(--secondary-color);
            text-decoration: none;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .tag:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .tags-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .tags-section h3 {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--secondary-color);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .reset-filter {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--secondary-color);
            cursor: pointer;
            margin-left: 1rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--secondary-color);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 4rem;
            gap: 1.5rem;
            font-family: var(--font-mono);
        }

        .pagination button {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--secondary-color);
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .pagination button:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .pagination button.active {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-brand">Nguyen Son</a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="publications.html">Publications</a>
                <a href="teaching.html">Teaching</a>
                <a href="talks.html">Talks</a>
                <a href="projects.html">Projects</a>
                <a href="blog.html">Blog</a>
                <a href="files/resume_sonnguyen.pdf" class="nav-cv" target="_blank">CV ↗</a>
            </div>
            <button class="mobile-menu-btn" id="menuBtn">
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <img src="img/avt2.jpg" alt="Nguyen Son" class="profile-img">
            <h2>Nguyen Son</h2>
            <p>University of Science - VNU</p>
            <p>Undergraduate Student</p>
            <p>Graduate Teaching Assistant</p>
            <p>Vietnam</p>
            <div class="social-links">
                <a href="https://github.com/rssonnm" title="Github" class="social-icon">
                    <span>Github</span>
                </a>
                <a href="https://x.com/sonmchems" title="Twitter" class="social-icon">
                    <span>Twitter</span>
                </a>
                <a href="https://scholar.google.com/citations?user=RpLurfYAAAAJ&hl=vi" title="Google Scholar"
                    class="social-icon">
                    <span>Scholar</span>
                </a>
            </div>
            <section class="tags-section">
                <h3>Filter by Tag</h3>
                <div class="popular-tags" id="popularTags"></div>
            </section>
        </aside>

        <main class="main-content">
            <section class="reveal">
                <h1>Blog</h1>
                <div class="accent-line"></div>
                <div class="blog-posts" id="blogPosts"></div>
            </section>

            <div class="pagination" id="pagination">
                <button id="prevBtn" onclick="previousPage()">&laquo; Prev</button>
                <div id="pageNumbers"></div>
                <button id="nextBtn" onclick="nextPage()">Next &raquo;</button>
            </div>
        </main>
    </div>

    <script>
        const posts = [
            {
                title: 'eBook "Machine Learning for the Sciences"',
                url: 'posts/2025/1_ml4s.html',
                date: 'Jan 5, 2025',
                description: '"Machine Learning for the Science" là cuốn sách điện tử đầu tiên tôi bắt tay vào viết như một tài liệu tham khảo dành cho sinh viên chuyên ngành khoa học cơ bản.',
                tags: ['Machine Learning', 'eBook']
            }
        ];

        const postsPerPage = 10;
        let currentPage = 1;
        let currentFilter = null;

        function getAllTags() {
            const tagCount = {};
            posts.forEach(post => {
                if (post.tags) {
                    post.tags.forEach(tag => {
                        tagCount[tag] = (tagCount[tag] || 0) + 1;
                    });
                }
            });
            return tagCount;
        }

        function displayPopularTags() {
            const tagCount = getAllTags();
            const popularTagsContainer = document.getElementById('popularTags');
            popularTagsContainer.innerHTML = '';

            Object.entries(tagCount)
                .sort((a, b) => b[1] - a[1])
                .forEach(([tag, count]) => {
                    const tagElement = document.createElement('a');
                    tagElement.href = '#';
                    tagElement.className = 'tag';
                    tagElement.textContent = `${tag} (${count})`;
                    tagElement.onclick = (e) => {
                        e.preventDefault();
                        filterByTag(tag);
                    };
                    popularTagsContainer.appendChild(tagElement);
                });
        }

        function filterByTag(tag) {
            currentFilter = tag;
            currentPage = 1;
            displayPosts();
        }

        function resetFilter() {
            currentFilter = null;
            currentPage = 1;
            displayPosts();
        }

        function displayPosts() {
            const blogPostsContainer = document.getElementById('blogPosts');
            const filteredPosts = currentFilter ?
                posts.filter(post => post.tags && post.tags.includes(currentFilter)) :
                posts;

            const start = (currentPage - 1) * postsPerPage;
            const end = start + postsPerPage;
            const currentPosts = filteredPosts.slice(start, end);

            blogPostsContainer.innerHTML = currentFilter ?
                `<h2>TAG: ${currentFilter} <span class="reset-filter" onclick="resetFilter(); return false;">[Clear Filter]</span></h2>` : '';

            currentPosts.forEach(post => {
                const tagsHTML = post.tags ? post.tags.map(tag =>
                    `<a href="#" class="tag" onclick="filterByTag('${tag}'); return false;">${tag}</a>`
                ).join('') : '';

                const postHTML = `
                    <div class="pub-item">
                        <div class="pub-content">
                            <div class="pub-title"><a href="${post.url}">${post.title}</a></div>
                            <div class="pub-authors">${post.date} &mdash; ${post.description}</div>
                            <div class="post-tags">
                                ${tagsHTML}
                            </div>
                        </div>
                        <div class="pub-links">
                            <a href="${post.url}" class="pub-link">Read</a>
                        </div>
                    </div>
                `;
                blogPostsContainer.innerHTML += postHTML;
            });

            updatePagination(filteredPosts.length);
        }

        function updatePagination(totalItems) {
            const totalPages = Math.ceil(totalItems / postsPerPage);
            const pageNumbers = document.getElementById('pageNumbers');
            pageNumbers.innerHTML = '';

            for (let i = 1; i <= Math.max(1, totalPages); i++) {
                const button = document.createElement('button');
                button.textContent = i;
                button.onclick = () => goToPage(i);
                if (i === currentPage) button.classList.add('active');
                pageNumbers.appendChild(button);
            }

            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages || totalPages === 0;
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                displayPosts();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(posts.length / postsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                displayPosts();
            }
        }

        function goToPage(page) {
            currentPage = page;
            displayPosts();
        }

        document.addEventListener('DOMContentLoaded', () => {
            displayPosts();
            displayPopularTags();
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
